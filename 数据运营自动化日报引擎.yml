    - data:
        code: "import csv\nfrom io import StringIO\nfrom collections import defaultdict\n\
          \ndef main(csv_data: str) -> dict:\n    if not csv_data:\n        return\
          \ {\"analyzed_result\": \"未获取到数据\"}\n    \n    # 解析 CSV\n    f = StringIO(csv_data.strip())\n\
          \    reader = csv.DictReader(f)\n    \n    daily_data = defaultdict(lambda:\
          \ {\"DAU\": 0, \"New_Users\": 0, \"Revenue\": 0.0})\n    \n    # 汇总数据\n\
          \    for row in reader:\n        if \"日期\" not in row or not row[\"日期\"\
          ]:\n            continue\n        date = row[\"日期\"]\n        try:\n   \
          \         daily_data[date][\"DAU\"] += int(row.get(\"DAU\") or 0)\n    \
          \        daily_data[date][\"New_Users\"] += int(row.get(\"新增用户\") or 0)\n\
          \            daily_data[date][\"Revenue\"] += float(row.get(\"充值金额(元)\"\
          ) or 0)\n        except Exception:\n            pass\n            \n   \
          \ if len(daily_data) < 2:\n        return {\"analyzed_result\": \"数据不足，无法计算环比\"\
          }\n        \n    # 计算环比\n    sorted_dates = sorted(daily_data.keys(), reverse=True)\n\
          \    today = sorted_dates[0]\n    yesterday = sorted_dates[1]\n    \n  \
          \  today_dau = daily_data[today][\"DAU\"]\n    yesterday_dau = daily_data[yesterday][\"\
          DAU\"]\n    dau_mom = ((today_dau - yesterday_dau) / yesterday_dau) * 100\
          \ if yesterday_dau else 0\n    \n    today_rev = daily_data[today][\"Revenue\"\
          ]\n    yesterday_rev = daily_data[yesterday][\"Revenue\"]\n    rev_mom =\
          \ ((today_rev - yesterday_rev) / yesterday_rev) * 100 if yesterday_rev else\
          \ 0\n    \n    # 组合结果\n    result_str = f\"最新数据日期：{today}\\n今日总DAU：{today_dau}（环比昨日：{dau_mom:.2f}%）\\\
          n今日总新增：{daily_data[today]['New_Users']}\\n今日总流水：{today_rev:.2f}元（环比昨日：{rev_mom:.2f}%）\\\
          n\\n各渠道详细原始数据参考：\\n{csv_data}\"\n    \n    return {\"analyzed_result\":\
          \ result_str}"
        code_language: python3
