            \ Markdown 格式《每日游戏运营简报》。\n\n### 你的任务要求\n1. **核心摘要提取**：首先用简短的一句话总结今日大盘表现。\n\
            2. **核心指标看板**：使用 Markdown 表格呈现今日的 DAU、新增、流水，并明确写出环比涨跌幅。\n3. **渠道表现洞察**：分析原始数据，指出今日表现最优的渠道以及表现疲软的渠道。\n\
            4. **智能异常预警**：\n   - 如果 DAU 或 流水环比下跌超过 10%，必须加上【红色预警】标签，并简述可能原因。\n   -\
            \ 如果大幅上涨，请加上【增长亮点】标签。\n5. **次日运营建议**：结合上述分析，给出 2 条具体、可落地的运营动作建议。\n\n###\
            \ 格式要求\n语气专业、精炼，多用数据说话。严禁捏造数据。"
